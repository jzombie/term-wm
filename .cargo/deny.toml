[advisories]
# RUSTSEC-2026-0192: ttf-parser is unmaintained but still a transitive dep of
# resvg/usvg (used for SVG rasterization in term-wm-ui-components).
# No safe upgrade available until resvg updates its font crate dependency.
ignore = ["RUSTSEC-2026-0192"]

[licenses]
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
