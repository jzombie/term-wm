[package]
name = "term-wm"
description = "A cross-platform window manager for terminal shells."
authors.workspace = true
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true

[package.metadata.cargo-udeps.ignore]
normal = ["windows-sys"]

[workspace]
members = [
    "crates/term-bench",
    "crates/term-wm-core",
    "crates/term-wm-ui-components",
]
resolver = "2"

[workspace.package]
authors = ["Jeremy Harris <jeremy.harris@zenosmosis.com>"]
version = "0.5.1-alpha"
edition = "2024"
repository = "https://github.com/jzombie/term-wm"
license = "MIT OR Apache-2.0"
publish = true

[workspace.dependencies]
clap = { version = "4.5.54", features = ["derive"] }
crossterm = "0.29.0"
indoc = "2.0.7"
ratatui = "0.30.0"

[dependencies]
clap = { workspace = true, features = ["derive"] }
line-ending = "1.5.1"
portable-pty = "0.9.0"
ratatui.workspace = true
term-wm-core = { path = "crates/term-wm-core" }
term-wm-ui-components = { path = "crates/term-wm-ui-components" }
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
webbrowser = "1.0.6"

[build-dependencies]
indoc = "2.0.7"

[dev-dependencies]
tempfile = "3.24.0"
